name: AI News Generate

on:
  schedule:
    # 08:37 Asia/Shanghai. Avoid GitHub Actions top-of-hour schedule drops.
    - cron: "37 0 * * *"
    # 09:17 Asia/Shanghai fallback. Existing daily issues are no-op by default.
    - cron: "17 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional issue date in Asia/Shanghai, for example 2026-06-06"
        required: false
        type: string
      force:
        description: "Overwrite an existing issue for the same date"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ai-news-generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          ref: main

      - name: Refresh main branch
        run: git pull --ff-only origin main

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Restore AI News source cache
        uses: actions/cache@v5.0.5
        with:
          path: .ai-news-cache
          key: ai-news-feed-cache-${{ github.run_id }}
          restore-keys: |
            ai-news-feed-cache-

      - name: Install dependencies
        run: npm ci

      - name: Generate AI News issue
        env:
          AI_NEWS_DATE: ${{ github.event.inputs.date || '' }}
          AI_NEWS_FORCE: ${{ github.event.inputs.force || 'false' }}
          AI_NEWS_REQUIRE_LLM: ${{ vars.AI_NEWS_REQUIRE_LLM || 'false' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          OPENAI_API_MODE: ${{ vars.OPENAI_API_MODE || 'responses' }}
          OPENAI_MAX_ATTEMPTS: ${{ vars.OPENAI_MAX_ATTEMPTS || '3' }}
        run: npm run news:generate

      - name: Build site
        run: npm run build

      - name: Upload internal selection log
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: ai-news-internal-log
          path: .ai-news-internal/
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit generated issue
        id: commit
        run: |
          if [ -z "$(git status --porcelain -- src/content/ai-news)" ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No new AI News issue to commit."
            exit 0
          fi

          issue_path="$(git status --porcelain -- src/content/ai-news | awk '{print $2}' | grep -E '^src/content/ai-news/.+\.md$' | grep -v '_template.md' | head -n 1)"
          if [ -z "$issue_path" ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No public AI News Markdown issue changed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$issue_path"
          git commit -m "docs: publish daily ai news"
          git push

          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "issue_path=$issue_path" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Send publish notification
        if: steps.commit.outputs.published == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AI_NEWS_EMAIL_FROM: ${{ vars.AI_NEWS_EMAIL_FROM }}
          AI_NEWS_NOTIFY_TO: ${{ vars.AI_NEWS_NOTIFY_TO || 'chengxisheng777@gmail.com' }}
          AI_NEWS_ISSUE_PATH: ${{ steps.commit.outputs.issue_path }}
          AI_NEWS_COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
          SITE_URL: https://charles-cheng.com
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::notice::RESEND_API_KEY is not configured. Skipping AI News email notification."
            exit 0
          fi

          if [ -z "$AI_NEWS_EMAIL_FROM" ]; then
            echo "::notice::AI_NEWS_EMAIL_FROM is not configured. Skipping AI News email notification."
            exit 0
          fi

          node scripts/notify-ai-news-publish.mjs

      - name: Send subscriber broadcast
        if: steps.commit.outputs.published == 'true' && vars.AI_NEWS_BROADCAST_ENABLED == 'true'
        env:
          KIT_V4_API_KEY: ${{ secrets.KIT_V4_API_KEY }}
          KIT_BROADCAST_FROM_EMAIL: ${{ vars.KIT_BROADCAST_FROM_EMAIL }}
          KIT_BROADCAST_TEMPLATE_ID: ${{ vars.KIT_BROADCAST_TEMPLATE_ID }}
          KIT_BROADCAST_SEND_AT: ${{ vars.KIT_BROADCAST_SEND_AT }}
          AI_NEWS_ISSUE_PATH: ${{ steps.commit.outputs.issue_path }}
          SITE_URL: https://charles-cheng.com
        run: npm run news:broadcast

      - name: Send failure notification
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AI_NEWS_EMAIL_FROM: ${{ vars.AI_NEWS_EMAIL_FROM }}
          AI_NEWS_NOTIFY_TO: ${{ vars.AI_NEWS_NOTIFY_TO || 'chengxisheng777@gmail.com' }}
          AI_NEWS_FAILURE_EMAIL: "true"
          AI_NEWS_FAILURE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AI_NEWS_FAILURE_MESSAGE: "AI News Generate failed. Check the GitHub Actions run logs."
          SITE_URL: https://charles-cheng.com
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::notice::RESEND_API_KEY is not configured. Skipping AI News failure notification."
            exit 0
          fi

          if [ -z "$AI_NEWS_EMAIL_FROM" ]; then
            echo "::notice::AI_NEWS_EMAIL_FROM is not configured. Skipping AI News failure notification."
            exit 0
          fi

          node scripts/notify-ai-news-publish.mjs
